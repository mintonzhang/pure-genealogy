services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_FAMILY_SURNAME: ${FAMILY_SURNAME:-张}
    ports:
      - "3001:3000"
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/family.db
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - FAMILY_SURNAME=${FAMILY_SURNAME:-张}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://0.0.0.0:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
